function attachFillupCalcListeners(vehicleId, editId) {
  const litersEl = document.getElementById('f-liters');
  const priceEl  = document.getElementById('f-price');
  const totalEl  = document.getElementById('f-total');
  const saveBtn  = document.getElementById('btn-save-fillup');
  const badge    = document.getElementById('f-calc-badge');
  const calcVal  = document.getElementById('f-calc-val');

  function calc() {
    const l = parseFloat(litersEl?.value);
    const p = parseFloat(priceEl?.value);
    if (!isNaN(l) && !isNaN(p) && l > 0 && p > 0) {
      const t = (l * p).toFixed(2);
      if (totalEl && !totalEl._manualEdit) {
        totalEl.value = t;
        if (badge) badge.style.display = 'inline-flex';
        if (calcVal) calcVal.textContent = t + ' €';
      }
    }
    validateFillupForm(vehicleId, editId);
  }

  if (litersEl) litersEl.addEventListener('input', calc);
  if (priceEl)  priceEl.addEventListener('input', calc);
  if (totalEl) {
    totalEl.addEventListener('focus', () => { totalEl._manualEdit = true; });
    totalEl.addEventListener('input', () => {
      if (badge) badge.style.display = 'none';
      validateFillupForm(vehicleId, editId);
    });
  }

  // Initial calc if data pre-filled
  calc();
  validateFillupForm(vehicleId, editId);

  // Date, km also trigger validation
  ['f-date','f-km'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => validateFillupForm(vehicleId, editId));
  });
}

function attachFillupCameraListeners(vehicleId, editId) {
  const camInput = document.getElementById('fillup-cam-input');
  const galInput = document.getElementById('fillup-gallery-input');
  if (!camInput) return;

  const handleFile = (file) => {
    if (!file) return;
    // Show scanning status inside form
    const status = document.getElementById('fillup-ocr-status');
    const camBtn = document.getElementById('fillup-cam-btn');
    if (status) {
      status.style.display = 'block';
      status.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--accent-bd);border-top-color:var(--accent);animation:spin 1s linear infinite;flex-shrink:0"></div>
        <div style="flex:1;font-size:13px;color:var(--t2)">Analitzant tiquet...</div>
        <span id="fillup-ocr-pct" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)">0%</span>
      </div>`;
    }
    if (camBtn) camBtn.style.borderColor = 'var(--accent)';

    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        // Preprocess image before OCR
        const processed = await preprocessImageForOCR(e.target.result);

        const worker = await Tesseract.createWorker('spa+eng', 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              const pct = Math.round(m.progress * 100);
              const el = document.getElementById('fillup-ocr-pct');
              if (el) el.textContent = pct + '%';
            }
          }
        });
        const { data } = await worker.recognize(processed);
        await worker.terminate();

        const parsed = parseOCRText(data.text);
        const f = parsed.fields;

        // Auto-fill form fields
        if (f.date)         { const el = document.getElementById('f-date');    if (el) el.value = f.date; }
        if (f.liters)       { const el = document.getElementById('f-liters');  if (el) el.value = f.liters; }
        if (f.pricePerLiter){ const el = document.getElementById('f-price');   if (el) el.value = f.pricePerLiter; }
        if (f.total)        { const el = document.getElementById('f-total');   if (el) el.value = f.total; }
        if (f.station)      { const el = document.getElementById('f-station'); if (el) el.value = f.station; }

        // Trigger recalc
        attachFillupCalcListeners(vehicleId, editId);

        // Show success/summary in status
        const detectedCount = [f.date,f.liters,f.pricePerLiter,f.total].filter(Boolean).length;
        if (status) {
          status.innerHTML = `
          <div style="background:var(--green-dim);border:1px solid rgba(63,185,80,0.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px">
            <span style="font-size:16px">✓</span>
            <span>Tiquet escanejat — ${detectedCount}/4 camps detectats. Revisa els valors.</span>
          </div>`;
        }

      } catch(err) {
        const status = document.getElementById('fillup-ocr-status');
        if (status) {
          status.innerHTML = `
          <div style="background:var(--red-dim);border:1px solid rgba(248,81,73,0.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--red);display:flex;align-items:center;gap:8px">
            <span>⚠</span><span>No s'ha pogut llegir el tiquet. Omple els camps manualment.</span>
          </div>`;
        }
      }
    };
    reader.readAsDataURL(file);
  };

  camInput.addEventListener('change', e => handleFile(e.target.files[0]));
  if (galInput) galInput.addEventListener('change', e => handleFile(e.target.files[0]));

  // Long press on camera button → open gallery instead
  const label = camInput.previousElementSibling;
  if (label) {
    let pressTimer;
    label.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => { if (galInput) galInput.click(); }, 600);
    });
    label.addEventListener('touchend', () => clearTimeout(pressTimer));
  }
}

function validateFillupForm(vehicleId, editId) {
  const getVal = id => document.getElementById(id)?.value?.trim() || '';
  const data = {
    date: getVal('f-date'), km: getVal('f-km'),
    liters: getVal('f-liters'), pricePerLiter: getVal('f-price')
  };

  const hasAll = data.date && data.km && data.liters && data.pricePerLiter;
  const saveBtn = document.getElementById('btn-save-fillup');
  if (saveBtn) saveBtn.disabled = !hasAll;

  // Inline km error
  if (data.km && +data.km > 0) {
    const allFs = DB.getFillupsSortedAsc(+vehicleId).filter(f => editId ? +f.id !== +editId : true);
    if (allFs.length > 0) {
      const maxK = Math.max(...allFs.map(f => +f.km));
      const kmErr = document.getElementById('err-f-km');
      if (+data.km <= maxK) {
        if (kmErr) kmErr.textContent = `Ha de ser > ${maxK.toLocaleString('ca')} km`;
        if (saveBtn) saveBtn.disabled = true;
      } else {
        if (kmErr) kmErr.textContent = '';
      }
    }
  }
}

// ── OCR SCANNER ────────────────────────────────────────────
// ─── OCR: PARSE TEXT FROM REAL TESSERACT RESULT ──────────────────────────────
function parseOCRText(text) {
  const norm = t => t.replace(/,/g, '.').replace(/[oO]/g, '0').replace(/[lI]/g, '1');
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // DATE — dd/mm/yyyy or dd.mm.yyyy or yyyy-mm-dd
  let date = null, dateConf = 0;
  const datePatterns = [
    { re: /(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/, fn: m => `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` },
    { re: /(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/, fn: m => `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}` },
  ];
  for (const line of lines) {
    for (const { re, fn } of datePatterns) {
      const m = line.match(re);
      if (m) { date = fn(m); dateConf = 85; break; }
    }
    if (date) break;
  }

  // LITERS — number followed by L/litres/litros/lts
  let liters = null, litersConf = 0;
  for (const line of lines) {
    const m = line.match(/(\d{1,3}[,\.]\d{1,3})\s*(?:l|L|litres?|lts|litros)/i)
           || line.match(/(?:litres?|volum|liters?)[^\d]*(\d{1,3}[,\.]\d{1,3})/i);
    if (m) {
      const val = parseFloat(norm(m[1]));
      if (val > 0.5 && val < 200) { liters = val; litersConf = 88; break; }
    }
  }

  // PRICE PER LITER — small number (0.8–3.5) near €/L or €/litre
  let pricePerLiter = null, priceConf = 0;
  for (const line of lines) {
    const m = line.match(/(\d[,\.]\d{2,3})\s*(?:€\/[lL]|€\/litre?|eur\/l)/i)
           || line.match(/(?:preu|precio|price)[^\d]*(\d[,\.]\d{2,3})/i)
           || line.match(/(\d[,\.]\d{3})\s*€/i);
    if (m) {
      const val = parseFloat(norm(m[1]));
      if (val > 0.8 && val < 4.0) { pricePerLiter = val; priceConf = 82; break; }
    }
  }

  // TOTAL — largest €-amount or labelled TOTAL/IMPORT
  let total = null, totalConf = 0;
  const euroAmounts = [];
  for (const line of lines) {
    const isTotal = /total|import|importe|amount|a\s*pagar/i.test(line);
    const m = line.match(/(\d{1,4}[,\.]\d{2})\s*€?/) || line.match(/€\s*(\d{1,4}[,\.]\d{2})/);
    if (m) {
      const val = parseFloat(norm(m[1]));
      if (val > 1) euroAmounts.push({ val, isTotal });
    }
  }
  if (euroAmounts.length) {
    const labelled = euroAmounts.find(x => x.isTotal);
    if (labelled) { total = labelled.val; totalConf = 90; }
    else { total = Math.max(...euroAmounts.map(x => x.val)); totalConf = 72; }
  }

  // STATION — first recognisable brand or first non-number line
  const brands = ['repsol','bp','cepsa','galp','shell','total','esso','agip','campsa','petronor','prio','disa','meroil'];
  let station = null, stationConf = 0;
  for (const line of lines) {
    const lower = line.toLowerCase();
    const brand = brands.find(b => lower.includes(b));
    if (brand) { station = line.replace(/[^a-zA-Z0-9À-ÿ\s\-]/g, '').trim().slice(0,30); stationConf = 88; break; }
  }
  if (!station) {
    const first = lines.find(l => /[a-zA-Z]{3,}/.test(l) && !/data|date|hora|time|\d{4}/i.test(l));
    if (first) { station = first.slice(0, 30); stationConf = 50; }
  }

  // Cross-validate: if liters & price known, check/infer total
  if (liters && pricePerLiter && !total) {
    total = parseFloat((liters * pricePerLiter).toFixed(2));
    totalConf = 70;
  }
  if (liters && pricePerLiter && total) {
    const calc = liters * pricePerLiter;
    if (Math.abs(calc - total) < 0.5) { totalConf = Math.max(totalConf, 90); litersConf = Math.max(litersConf, 90); }
  }

  return {
    fields: {
      date: date || new Date().toISOString().split('T')[0],
      liters: liters || null,
      pricePerLiter: pricePerLiter || null,
      total: total || null,
      station: station || '',
    },
    confidence: {
      date: date ? dateConf : 0,
      liters: liters ? litersConf : 0,
      pricePerLiter: pricePerLiter ? priceConf : 0,
      total: total ? totalConf : 0,
      station: station ? stationConf : 0,
    },
    rawText: text,
  };
}

// ─── OCR: REAL TESSERACT PROCESSING ──────────────────────────────────────────
// Preprocess image for better OCR (grayscale + contrast + scale)
function preprocessImageForOCR(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1600 / img.width, 2200 / img.height, 2);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // Grayscale + contrast boost
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        const c    = Math.min(255, Math.max(0, (gray - 128) * 1.6 + 148));
        d[i] = d[i+1] = d[i+2] = c;
      }
      ctx.putImageData(imgData, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.onerror = () => resolve(dataUrl); // fallback: use original
    img.src = dataUrl;
  });
}

async function runTesseractOCR(imageData) {
  S.ocrStep = 'scanning';
  S._realScan = true;
  renderOCRScanningUI();

  try {
    // Preprocess for better recognition
    const processed = await preprocessImageForOCR(imageData);

    const worker = await Tesseract.createWorker('spa+eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          const el = document.getElementById('ocr-progress');
          if (el) el.textContent = pct + '%';
        }
      }
    });

    const { data } = await worker.recognize(processed);
    await worker.terminate();

    const parsed = parseOCRText(data.text);
    parsed.name = parsed.fields.station || 'Foto escaneajada';
    parsed.id = 0;

    S.ocrResult = parsed;
    S.ocrStep = 'results';
    renderOCRModalContent();
  } catch(err) {
    document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;padding:32px">
      <div style="font-size:48px">😔</div>
      <div style="font-size:15px;font-weight:700;color:var(--t1);margin:12px 0 8px">Error en l'escaneig</div>
      <div style="font-size:13px;color:var(--t2)">${escapeHtml(err.message || 'No s\'ha pogut processar la imatge.')}</div>
      <button class="btn-secondary" style="margin-top:16px" id="ocr-err-back">← Tornar</button>
    </div>`;
    document.getElementById('modal-footer').innerHTML = '';
    setTimeout(() => {
      const b = document.getElementById('ocr-err-back');
      if (b) b.addEventListener('click', () => { S.ocrStep = 'select'; renderOCRStep(); });
    }, 50);
  }
}

    </div>` : ''}
    ${ticket.rawText ? `<details style="margin-top:10px"><summary style="font-size:11px;color:var(--t3);cursor:pointer">Veure text OCR raw</summary>
    <pre style="font-size:10px;color:var(--t3);white-space:pre-wrap;background:var(--card);padding:8px;border-radius:8px;margin-top:6px;max-height:100px;overflow-y:auto">${escapeHtml(ticket.rawText.slice(0,500))}</pre></details>` : ''}`;

    footer = `
    <button class="btn-secondary" id="ocr-back-btn">← Tornar</button>
    <button class="btn-primary" id="ocr-apply-btn">Aplicar al formulari</button>`;
  }

  openModal(title, body, footer);
  // Attach camera input after render
  if (S.ocrStep === 'select') {
    setTimeout(() => attachOCRInputListeners(), 50);
  }
}

function handleOCRImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    S._imagePreview = e.target.result;
    S._realScan = true;
    runTesseractOCR(e.target.result);
  };
  reader.readAsDataURL(file);
}

function attachGlobalListeners() {
  // Vehicle card click → detail
  document.querySelectorAll('.vehicle-card').forEach(card => {
    card.addEventListener('click', e => {
      const action = e.target.closest('[data-action]');
      if (action) return; // handled by buttons
      const id = +card.dataset.vehicleId;
      if (id) {
        S.selectedVehicleId = id;
        S.vehicleDetailTab = 'fillups';
        S.tab = 'vehicles';
        pushScreen('vehicle-detail', { vehicleId: id });
      }
    });
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = +btn.dataset.id;
      if (action === 'edit-vehicle')   openAddVehicleModal(id);
      if (action === 'add-fillup')     { S.selectedVehicleId = id; openAddFillupModal(id); }
      if (action === 'delete-vehicle') confirmDeleteVehicle(id);
      if (action === 'goto-vehicle-service') {
        S.selectedVehicleId = id;
        S.vehicleDetailTab = 'service';
        S.tab = 'vehicles';
        S.stack = [{ id:'vehicles', params:{} }];
        pushScreen('vehicle-detail', { vehicleId: id });
      }
    });
  });

  // Add vehicle buttons
  const btnAdd = document.getElementById('btn-add-vehicle');
  if (btnAdd) btnAdd.addEventListener('click', () => openAddVehicleModal());

  const btnEmptyAdd = document.getElementById('btn-empty-add-vehicle');
  if (btnEmptyAdd) btnEmptyAdd.addEventListener('click', () => openAddVehicleModal());

  // Back button
  const btnBack = document.getElementById('btn-back');
  if (btnBack) btnBack.addEventListener('click', () => {
    S.tab = 'vehicles';
    S.stack = [{ id:'vehicles', params:{} }];
    renderScreen('vehicles', {});
  });

  // Add fillup from detail
  const btnAddDetail = document.getElementById('btn-add-fillup-detail');
  if (btnAddDetail) btnAddDetail.addEventListener('click', () => {
    if (S.selectedVehicleId) openAddFillupModal(S.selectedVehicleId);
  });

  // OCR scan
  const btnOCR = document.getElementById('btn-ocr-scan');
  if (btnOCR) btnOCR.addEventListener('click', () => {
    if (S.selectedVehicleId) openOCRModal(S.selectedVehicleId);
  });

  const btnServiceDone = document.getElementById('btn-mark-service-done');

  if (toggleDark) {
    toggleDark.addEventListener('change', () => {

  if (btnExport) btnExport.addEventListener('click', exportData);

  const btnClear = document.getElementById('btn-clear-data');
  if (btnClear) btnClear.addEventListener('click', clearAllData);

  // Swipe to delete fill-up items

// ── SWIPE TO DELETE ────────────────────────────────────────
function attachSwipeListeners() {
  document.querySelectorAll('.fillup-item-wrap').forEach(wrap => {
    const item = wrap.querySelector('.fillup-item');
    if (!item) return;

    let startX = 0, startY = 0, currentX = 0, isSwiping = false, isVertical = null;

    function onStart(e) {
      startX = e.touches ? e.touches[0].clientX : e.clientX;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      isSwiping = true;
      isVertical = null;
      item.style.transition = 'none';
    }

    function onMove(e) {
      if (!isSwiping) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const dx = startX - x;
      const dy = Math.abs(startY - y);

      if (isVertical === null) {
        isVertical = dy > Math.abs(dx);
      }
      if (isVertical) { isSwiping = false; return; }

      if (e.cancelable) e.preventDefault();
      currentX = Math.max(0, dx);
      item.style.transform = `translateX(-${Math.min(currentX, SWIPE_THRESHOLD + 20)}px)`;
    }

    function onEnd() {
      if (!isSwiping) return;
      isSwiping = false;
      item.style.transition = 'transform 0.25s ease';

      if (currentX >= SWIPE_THRESHOLD) {
        const fid = +wrap.dataset.fillupId;
        deleteFillup(fid);
        item.style.transform = `translateX(-${wrap.offsetWidth}px)`;
        setTimeout(() => { wrap.style.display = 'none'; }, 300);
      } else {
        item.style.transform = 'translateX(0)';
      }
      currentX = 0;
    }

    item.addEventListener('touchstart', onStart, { passive: true });
    item.addEventListener('touchmove', onMove, { passive: false });
    item.addEventListener('touchend', onEnd);
    item.addEventListener('mousedown', onStart);
    item.addEventListener('mousemove', onMove);
    item.addEventListener('mouseup', onEnd);
    item.addEventListener('mouseleave', onEnd);
  });
}

// CRUD OPERATIONS
// =========================================================

// SAVE VEHICLE
function saveVehicle() {
  const name  = document.getElementById('v-name')?.value?.trim() || '';
  const brand = document.getElementById('v-brand')?.value?.trim() || '';
  const model = document.getElementById('v-model')?.value?.trim() || '';
  const year  = +document.getElementById('v-year')?.value || 2020;
  const fuel  = document.getElementById('v-fuel')?.value || 'diesel';
  const plate = (document.getElementById('v-plate')?.value?.trim() || '').toUpperCase();
  const color = document.getElementById('v-color')?.value || COLORS[0];
  const interval = +document.getElementById('v-interval')?.value || 15000;
  const lastkm   = +document.getElementById('v-lastkm')?.value || 0;

  const errEl = document.getElementById('err-v-name');
  if (!name) {
    if (errEl) errEl.textContent = 'El nom és obligatori';
    return;
  }
  if (errEl) errEl.textContent = '';

  const vehicles = DB.getVehicles();
  if (S.editingVehicle) {
    // EDIT: find by numeric ID
    const idx = vehicles.findIndex(v => +v.id === +S.editingVehicle);
    if (idx === -1) { showToast('Error: vehicle no trobat'); return; }
    vehicles[idx] = { ...vehicles[idx], name, brand, model, year, fuelType: fuel, plate, color, serviceIntervalKm: interval, lastServiceKm: lastkm };
    DB.saveVehicles(vehicles);
    closeModal();
    showToast('Vehicle actualitzat ✓');
    if (S.stack.some(s => s.id === 'vehicle-detail')) {
      pushScreen('vehicle-detail', { vehicleId: +S.editingVehicle });
    } else {
      renderApp();
    }
  } else {
    // ADD
    const newV = {
      id: DB.nextId(vehicles), name, brand, model, year, fuelType: fuel,
      plate, color, serviceIntervalKm: interval, lastServiceKm: lastkm,
      createdAt: Date.now()
    };
    vehicles.push(newV);
    DB.saveVehicles(vehicles);
    closeModal();
    showToast(`"${name}" afegit ✓`);
    renderApp();
  }
}

// CONFIRM DELETE VEHICLE
function confirmDeleteVehicle(vehicleId) {
  const vid = +vehicleId;
  const v = DB.getVehicle(vid);
  if (!v) return;
  const fillupCount = DB.getFillups(vid).length;

  openModal('Eliminar vehicle', `
  <div style="text-align:center;padding:16px 0">
    <div style="font-size:48px;margin-bottom:12px">🗑️</div>
    <div style="font-size:16px;font-weight:700;color:var(--t1);margin-bottom:8px">Eliminar "${escapeHtml(v.name)}"?</div>
    <div style="font-size:13px;color:var(--t2)">S'eliminaran <strong style="color:var(--red)">${fillupCount} repostatge${fillupCount!==1?'s':''}</strong> i tots els registres associats. Podràs desfer aquesta acció durant 5 segons.</div>
  </div>`,
  `<button class="btn-secondary" id="modal-cancel-btn">Cancel·lar</button>
   <button class="btn-danger" id="btn-confirm-delete-vehicle" style="flex:1">Sí, eliminar</button>`);

  setTimeout(() => {
    const btnConfirm = document.getElementById('btn-confirm-delete-vehicle');
    if (btnConfirm) btnConfirm.addEventListener('click', () => {
      // BUG FIX APPLIED: deleteVehicleCascade uses +id everywhere, atomic saves
      const backup = DB.deleteVehicleCascade(vid);
      closeModal();
      renderApp();
      Undo.pushVehicle(backup);
    });
    const btnCancel = document.getElementById('modal-cancel-btn');
    if (btnCancel) btnCancel.addEventListener('click', closeModal);
  }, 50);
}

// SAVE FILLUP
function saveFillup() {
  const vid = S.selectedVehicleId;
  if (!vid) return;

  const date     = document.getElementById('f-date')?.value?.trim() || '';
  const km       = document.getElementById('f-km')?.value?.trim() || '';
  const liters   = document.getElementById('f-liters')?.value?.trim() || '';
  const price    = document.getElementById('f-price')?.value?.trim() || '';
  const total    = document.getElementById('f-total')?.value?.trim() || '';
  const station  = document.getElementById('f-station')?.value?.trim() || '';
  const notes    = document.getElementById('f-notes')?.value?.trim() || '';

  // Validate
  const errors = Logic.validateFillup({ date, km, liters, pricePerLiter: price }, +vid, S.editingFillup);

  if (Object.keys(errors).length > 0) {
    const globalErr = document.getElementById('form-global-error');
    if (globalErr) {
      globalErr.style.display = 'flex';
      globalErr.innerHTML = '⚠ ' + Object.values(errors)[0];
    }
    if (errors.km) {
      const kmErr = document.getElementById('err-f-km');
      if (kmErr) kmErr.textContent = errors.km;
    }
    return;
  }

  const calculatedTotal = (parseFloat(liters) * parseFloat(price)).toFixed(2);
  const finalTotal = total ? +total : +calculatedTotal;

  const allFillups = DB.getAllFillups();

  if (S.editingFillup) {
    // EDIT: find by numeric ID
    const idx = allFillups.findIndex(f => +f.id === +S.editingFillup);
    if (idx === -1) { showToast('Error: repostatge no trobat'); return; }
    allFillups[idx] = {
      ...allFillups[idx],
      date, km: +km, liters: parseFloat(liters), pricePerLiter: parseFloat(price),
      total: finalTotal, station, notes, updatedAt: Date.now()
    };
    DB.saveFillups(allFillups);
    Logic.syncPriceChanges(+vid);
    closeModal();
    showToast('Repostatge actualitzat ✓');
  } else {
    // ADD
    const newF = {
      id: DB.nextId(allFillups), vehicleId: +vid,
      date, km: +km, liters: parseFloat(liters), pricePerLiter: parseFloat(price),
      total: finalTotal, station, notes, createdAt: Date.now()
    };
    allFillups.push(newF);
    DB.saveFillups(allFillups);
    Logic.syncPriceChanges(+vid);
    closeModal();
    showToast('Repostatge afegit ✓');
  }

  // Refresh detail view
  if (S.selectedVehicleId) {
    S.vehicleDetailTab = 'fillups';
    pushScreen('vehicle-detail', { vehicleId: +vid });
  }
}

// DELETE FILLUP
function deleteFillup(fillupId) {
  try {
    const backup = DB.deleteFillup(+fillupId);
    Logic.syncPriceChanges(+backup.vehicleId);
    Undo.pushFillup(backup);
    // Re-render to reflect cascade
    setTimeout(() => updateServicesBadge(), 100);
  } catch(e) {
    showToast('Error eliminant: ' + e.message);
  }
}

// SAVE SERVICE CONFIG
function saveServiceConfig() {
  if (!S.selectedVehicleId) return;
  const interval = +document.getElementById('service-interval-input')?.value || 15000;
  const lastkm   = +document.getElementById('service-lastkm-input')?.value || 0;

  const vehicles = DB.getVehicles();
  const idx = vehicles.findIndex(v => +v.id === +S.selectedVehicleId);
  if (idx === -1) return;
  vehicles[idx].serviceIntervalKm = interval;
  vehicles[idx].lastServiceKm     = lastkm;
  DB.saveVehicles(vehicles);
  showToast('Configuració guardada ✓');
  pushScreen('vehicle-detail', { vehicleId: +S.selectedVehicleId });
}

// =========================================================
// THEME
// =========================================================
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  const settings = DB.getSettings();
  settings.theme = theme;
  DB.saveSettings(settings);
}

function loadTheme() {
  const settings = DB.getSettings();
  if (settings.theme) applyTheme(settings.theme);
  else applyTheme('dark');
}

// =========================================================
// DATA EXPORT / CLEAR
// =========================================================
function exportData() {
  const data = {
    vehicles:     DB.getVehicles(),
    fillups:      DB.getAllFillups(),
    priceChanges: DB.getAllPriceChanges(),
    services:     DB.getAllServices(),
    exportedAt:   new Date().toISOString(),
    version:      '3.0'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'gasoll-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Dades exportades ✓');
}

function clearAllData() {
  openModal('Esborrar totes les dades', `
  <div style="text-align:center;padding:16px 0">
    <div style="font-size:48px">⚠️</div>
    <div style="font-size:16px;font-weight:700;color:var(--red);margin:12px 0 8px">Acció irreversible!</div>
    <div style="font-size:13px;color:var(--t2)">S'eliminaran tots els vehicles, repostatges i registres. Aquesta acció no es pot desfer.</div>
  </div>`,
  `<button class="btn-secondary" id="modal-cancel-btn">Cancel·lar</button>
   <button class="btn-danger" style="flex:1" id="btn-confirm-clear">Esborrar tot</button>`);

  setTimeout(() => {
    const btn = document.getElementById('btn-confirm-clear');
    if (btn) btn.addEventListener('click', () => {
      [DB.K.V, DB.K.F, DB.K.P, DB.K.SV].forEach(k => localStorage.removeItem(k));
      closeModal();
      seedData();
      renderApp();
      showToast('Dades esborrades. Dades de demo restaurades.');
    });
    const bc = document.getElementById('modal-cancel-btn');
    if (bc) bc.addEventListener('click', closeModal);
  }, 50);
}

function updateClock() {
  const el = document.getElementById('status-clock');
  if (!el) return;
  const now = new Date();
  const h   = now.getHours();
  const m   = String(now.getMinutes()).padStart(2, '0');
  el.textContent = `${h}:${m}`;
}
